    <!-- Export Modal -->
    <div id="exportModal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title">⬇️ Export</span>
                <button class="modal-close" onclick="closeExportModal()">×</button>
            </div>

            <div class="export-options">
                <label class="radio-option">
                    <input type="radio" name="exportType" value="all" checked onchange="updateExportOptions()">
                    <span>Všetko (kompletná záloha)</span>
                </label>
                <label class="radio-option">
                    <input type="radio" name="exportType" value="trees" onchange="updateExportOptions()">
                    <span>Len stromy</span>
                </label>
                <label class="radio-option">
                    <input type="radio" name="exportType" value="errors" onchange="updateExportOptions()">
                    <span>Len chybové kódy</span>
                </label>
                <label class="radio-option">
                    <input type="radio" name="exportType" value="manuals" onchange="updateExportOptions()">
                    <span>Len manuály</span>
                </label>
                <label class="radio-option">
                    <input type="radio" name="exportType" value="photos" onchange="updateExportOptions()">
                    <span>Len fotky (Base64)</span>
                </label>
                <label class="radio-option">
                    <input type="radio" name="exportType" value="category" onchange="updateExportOptions()">
                    <span>Konkrétna kategória</span>
                </label>
                <label class="radio-option">
                    <input type="radio" name="exportType" value="tree" onchange="updateExportOptions()">
                    <span>Konkrétny strom</span>
                </label>
            </div>

            <div id="exportSelectSection" class="hidden">
                <select id="exportSelect"></select>
            </div>

            <div id="exportBrandSection" class="hidden">
                <div class="import-action-title">Značka:</div>
                <div class="brand-grid" id="exportBrandGrid"></div>
            </div>

            <div class="export-format">
                <div class="import-action-title">Formát:</div>
                <label class="radio-option">
                    <input type="radio" name="exportFormat" value="json" checked>
                    <span>JSON (pre import)</span>
                </label>
                <label class="radio-option">
                    <input type="radio" name="exportFormat" value="pretty">
                    <span>JSON (čitateľný)</span>
                </label>
            </div>

            <button class="btn-primary" onclick="processExport()">📋 Kopírovať do schránky</button>
            <button class="btn-secondary" onclick="downloadExport()">💾 Stiahnuť súbor</button>

            <div class="code-display" id="exportResult"></div>
        </div>
    </div>
